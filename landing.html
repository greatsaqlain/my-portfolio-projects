<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Landing Page</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
    }

    header {
      background: #0f172a;
      color: white;
      padding: 20px;
      text-align: center;
    }

    .hero {
      padding: 60px 20px;
      text-align: center;
      background: #e2e8f0;
    }

    .hero h1 {
      font-size: 2.5rem;
    }

    .hero p {
      margin: 15px 0;
    }

    .hero button {
      padding: 10px 20px;
      background: #0f172a;
      color: white;
      border: none;
      cursor: pointer;
    }

    .features {
      display: flex;
      justify-content: space-around;
      padding: 40px 20px;
      text-align: center;
    }

    .feature {
      max-width: 200px;
    }

    footer {
      background: #0f172a;
      color: white;
      text-align: center;
      padding: 15px;
    }
  </style>
</head>

<body>

<header>
  <h2>My Website</h2>
</header>

<section class="hero">
  <h1>Welcome to My Website</h1>
  <p>I create simple and clean web designs.</p>
  <button>Get Started</button>
</section>

<section class="features">
  <div class="feature">
    <h3>Fast</h3>
    <p>Quick loading websites.</p>
  </div>

  <div class="feature">
    <h3>Clean</h3>
    <p>Simple and modern design.</p>
  </div>

  <div class="feature">
    <h3>Responsive</h3>
    <p>Works on all devices.</p>
  </div>
</section>

<footer>
  <p>© 2026 Saqlain Shaikh</p>
</footer>

</body>
</html>
